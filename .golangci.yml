version: "2"
run:
  timeout: 3m
linters:
  default: none
  enable:
    - copyloopvar
    - dogsled
    - dupl
    - errcheck
    - exhaustive
    - gocognit
    - goconst
    - gocritic
    - gocyclo
    - goprintffuncname
    - gosec
    - govet
    - ineffassign
    - misspell
    - mnd
    - nakedret
    - nolintlint
    - staticcheck
    - unconvert
    - unparam
    - unused
    - whitespace
  settings:
    dupl:
      threshold: 100
    goconst:
      min-len: 3
      min-occurrences: 3
      ignore-string-values:
        - '^true$'
        - 'Help for '
        - 'Bearer '
        - 'https://'
        - '/dags\.tar\.gz'
        - 'The (new )?role for the '
    gocritic:
      disabled-checks:
        - dupImport
        - octalLiteral
        - whyNoLint
        - wrapperFunc
      enabled-tags:
        - diagnostic
        - experimental
        - opinionated
        - performance
        - style
    gocyclo:
      min-complexity: 25
    govet:
      enable:
        - shadow
    misspell:
      locale: US
    mnd:
      checks:
        - argument
        - case
        - condition
        - return
      ignored-numbers:
        - "2"
        - "10"
        - "64"
    nolintlint:
      require-explanation: false
      require-specific: false
      allow-unused: true
    staticcheck:
      checks:
        - all
        - "-QF*"    # quickfix suggestions, fix incrementally
        - "-ST1005" # capitalized error strings, fix incrementally
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      - linters:
          - dupl
          - errcheck
          - goconst
          - gocyclo
          - gosec
          - mnd
          - unused
        path: _test\.go
      - path: (.+)\.go$
        text: 'shadow: declaration of .err. shadows declaration'
      - path: (.+)\.go$
        text: 'sloppyTestFuncName: function cleanUpInitFiles should be of form'
      # gosec rules newly surfaced in v2, fix incrementally
      - linters: [gosec]
        text: 'G115:'
      - linters: [gosec]
        text: 'G117:'
      - linters: [gosec]
        text: 'G122:'
      - linters: [gosec]
        text: 'G602:'
    paths:
      - third_party$
      - builtin$
      - examples$
formatters:
  enable:
    - gci
    - gofumpt
  settings:
    gci:
      sections:
        - standard
        - default
        - prefix(github.com/astronomer/astro-cli)
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
