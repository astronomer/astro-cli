project_name: astro
version: 2
before:
  hooks:
    - go mod download
    - go mod tidy
release:
  github:
    owner: astronomer
    name: astro-cli
  # "auto" marks prerelease tags (e.g. v1.43.0-rc.1, v1.43.0-nightly.20260522) as prerelease,
  # and clean semver tags (e.g. v1.43.0) as full releases.
  prerelease: auto
changelog:
  sort: asc
  use: github
builds:
  - id: darwin-build
    main: main.go
    binary: astro
    env:
      - CGO_ENABLED=1
      - CC=o64-clang
      - CXX=o64-clang++
    goos:
      - darwin
    goarch:
      - arm64
      - amd64
    ldflags: -s -w -X github.com/astronomer/astro-cli/version.CurrVersion={{ .Version }}
  - id: linux-build
    main: main.go
    binary: astro
    env:
      - CGO_ENABLED=0
    goos:
      - linux
    goarch:
      - 386
      - arm64
      - amd64
    ldflags: -s -w -X github.com/astronomer/astro-cli/version.CurrVersion={{ .Version }}
  - id: windows-build
    main: main.go
    binary: astro
    env:
      - CGO_ENABLED=0
    goos:
      - windows
    goarch:
      - amd64
      - arm64
    ldflags: -s -w -X github.com/astronomer/astro-cli/version.CurrVersion={{ .Version }}
brews:
  - name: astro
    repository:
      owner: astronomer
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
      pull_request:
        enabled: true
        base:
          owner: astronomer
          name: homebrew-tap
          branch: main
    directory: Formula
    skip_upload: auto
    homepage: https://astronomer.io
    description: To build and run Airflow DAGs locally via docker-compose and deploy DAGs to Astronomer-managed Airflow clusters and interact with the Astronomer API.
    dependencies:
      - name: podman
        type: recommended
        os: mac
    test: |
      system "#{bin}/astro version"
  - name: "astro@{{ .Version }}"
    repository:
      owner: astronomer
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
      pull_request:
        enabled: true
        base:
          owner: astronomer
          name: homebrew-tap
          branch: main
    directory: Formula
    skip_upload: auto
    homepage: https://astronomer.io
    description: To build and run Airflow DAGs locally via docker-compose and deploy DAGs to Astronomer-managed Airflow clusters and interact with the Astronomer API.
    dependencies:
      - name: podman
        type: recommended
        os: mac
    test: |
      system "#{bin}/astro version"
archives:
  - id: unix-archives
    builds:
      - darwin-build
      - linux-build
    format: tar.gz
    name_template: "{{ .Binary }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - LICENSE*
      - README*
  - id: windows-exe
    builds:
      - windows-build
    format: binary
    name_template: "{{ .Binary }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
  - id: windows-zip
    builds:
      - windows-build
    format: zip
    name_template: "{{ .Binary }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - LICENSE*
      - README*
snapshot:
  name_template: SNAPSHOT-{{ .Commit }}
checksum:
  name_template: "{{ .ProjectName }}_{{ .Version }}_checksums.txt"
