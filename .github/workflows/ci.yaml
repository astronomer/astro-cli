name: CI

on:
  push:
    branches:
      - main
      - 'release-*'
  pull_request:
    branches:
      - main
      - 'release-*'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Cache prek tools
        uses: actions/cache@v4
        with:
          path: ~/.cache/prek
          key: prek-v1-${{ hashFiles('prek.toml') }}

      - name: Install prek
        run: |
          PREK_VERSION="0.3.8"
          ARCH=$(uname -m)
          case "$ARCH" in
            x86_64)  SHA256="732cfb03960e6dfd5df2cb67906797aa8831750ef3a6f6340ec2b90ee8b7a59f" ;;
            aarch64) SHA256="b88d96aef4ea84999d12958c390611d3a26194ee57225fe2ff15a9855e3a71bf" ;;
            *) echo "Unsupported arch: $ARCH" && exit 1 ;;
          esac
          curl -fsSL "https://github.com/j178/prek/releases/download/v${PREK_VERSION}/prek-${ARCH}-unknown-linux-musl.tar.gz" \
            -o /tmp/prek.tar.gz
          echo "${SHA256}  /tmp/prek.tar.gz" | sha256sum -c
          mkdir -p ~/bin
          tar -xz --strip-components=1 -C ~/bin -f /tmp/prek.tar.gz
          echo "$HOME/bin" >> $GITHUB_PATH
          ~/bin/prek --version

      - name: Check formatting
        run: |
          make fmt
          git diff --exit-code

      - name: Run golangci-lint
        run: make lint

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run unit tests
        env:
          HOUSTON_HOST: houston
        run: make test

      - name: Upload coverage to Coveralls
        uses: coverallsapp/github-action@v2
        continue-on-error: true
        with:
          file: coverage.txt
          format: golang

  test-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run unit tests
        run: go test -count=1 -cover -covermode=atomic -test.v ./...

  integration-test:
    if: github.event_name == 'workflow_dispatch'
    needs: [lint, test, test-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install poetry
        run: pip install poetry

      - name: Build astro cli
        run: make build

      - name: Run integration tests
        run: |
          python -m venv penv
          . penv/bin/activate
          cd integration-test && poetry install --no-root
          pytest -x -s -v dev_test.py
