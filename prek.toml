# Configuration file for `prek`, a git hook framework written in Rust.
# See https://prek.j178.dev for more information.
#:schema https://www.schemastore.org/prek.json

exclude = '(vendor|.vscode)'

[[repos]]
repo = "local"
hooks = [
  {
    id = "gofumpt",
    name = "gofumpt",
    types = ["go"],
    language = "golang",
    entry = "gofumpt -w",
    exclude = "(mocks/|\\.gen\\.go$)",
    additional_dependencies = ["mvdan.cc/gofumpt@v0.7.0"],
  },
  {
    id = "golangci-lint",
    name = "golangci-lint",
    types = ["go"],
    language = "golang",
    entry = "golangci-lint run --timeout 15m0s",
    pass_filenames = false,
    additional_dependencies = ["github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.11.4"],
  },
]

[[repos]]
repo = "https://github.com/psf/black"
rev = "25.1.0"
hooks = [
  { id = "black" },
]

[[repos]]
repo = "https://github.com/pre-commit/pre-commit-hooks"
rev = "v6.0.0"
hooks = [
  { id = "check-case-conflict" },
  { id = "check-executables-have-shebangs" },
  { id = "check-json" },
  { id = "check-merge-conflict" },
  { id = "check-toml" },
  { id = "check-xml" },
  { id = "check-yaml", exclude = "airflow/include/composeyml.yml", args = ["--allow-multiple-documents"] },
  { id = "detect-private-key" },
  { id = "end-of-file-fixer" },
  { id = "file-contents-sorter", args = ["--ignore-case"], files = "^\\.gitignore$" },
  { id = "mixed-line-ending", args = ["--fix=lf"] },
  { id = "no-commit-to-branch", args = ["-b", "main"] },
  { id = "pretty-format-json", args = ["--autofix", "--no-ensure-ascii"] },
  { id = "sort-simple-yaml" },
  { id = "trailing-whitespace", exclude = ".*_test\\.go$" },
]

[[repos]]
repo = "https://github.com/lovesegfault/beautysh"
rev = "v6.2.1"
hooks = [
  { id = "beautysh", args = ["--indent-size", "2"], additional_dependencies = ["setuptools<82"] },
]

[[repos]]
repo = "https://github.com/adrienverge/yamllint.git"
rev = "v1.37.1"
hooks = [
  { id = "yamllint" },
]

[[repos]]
repo = "https://github.com/astronomer/pre-commit-hooks"
rev = "37614dad793bbbdea699c63c8b341ce1e2bf855a"
hooks = [
  { id = "CVE-2017-18342" },
  { id = "replace-en-dashes" },
  { id = "replace-unicode-non-breaking-spaces" },
  { id = "remove-unicode-zero-width-non-breaking-spaces" },
  { id = "remove-unicode-zero-width-space" },
]
