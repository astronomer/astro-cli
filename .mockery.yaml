---
filename: "{{.InterfaceName}}.go"
outpkg: "{{.PackageName}}_mocks"
mockname: "{{.InterfaceName}}"
with-expecter: false
packages:
  github.com/astronomer/astro-cli/houston:
    config:
      dir: houston/mocks
    interfaces:
      ClientInterface:
  github.com/astronomer/astro-cli/airflow:
    config:
      dir: airflow/mocks
      outpkg: mocks
    interfaces:
      RegistryHandler:
      ImageHandler:
      ContainerHandler:
      DockerComposeAPI:
      DockerRegistryAPI:
      DockerCLIClient:
  github.com/astronomer/astro-cli/airflow-client:
    config:
      dir: airflow-client/mocks
      outpkg: airflow_mocks
    interfaces:
      Client:
  github.com/astronomer/astro-cli/astro-client-v1:
    config:
      dir: astro-client-v1/mocks
    interfaces:
      ClientWithResponsesInterface:
        config:
          filename: client.go
  github.com/astronomer/astro-cli/astro-client-v1alpha1:
    config:
      dir: astro-client-v1alpha1/mocks
    interfaces:
      ClientWithResponsesInterface:
        config:
          filename: client.go
  github.com/astronomer/astro-cli/pkg/azure:
    config:
      dir: pkg/azure/mocks
    interfaces:
      Azure:
  github.com/astronomer/astro-cli/airflow/runtimes:
    config:
      dir: airflow/runtimes/mocks
      outpkg: mocks
    interfaces:
      OSChecker:
      EnvChecker:
      FileChecker:
      HostInspector:
      ContainerRuntime:
      PodmanEngine:
      DockerEngine:
